<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelly Pessoa Agendamentos</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Roboto',Arial,sans-serif;
  background:url("file_00000000497471f5a351a64d074cb17d.png") no-repeat center center fixed;
  background-size:cover;
}
.container{
  background:rgba(255,255,255,0.95);
  max-width:650px;
  margin:40px auto;
  padding:25px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  position:relative;
}
h1,h2{text-align:center;color:#d63384;}
input,select,button{
  width:100%;
  padding:10px;
  margin:8px 0 15px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}
button{
  background:#d63384;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover{opacity:0.9;}

#btnAdmin{
  position:absolute;
  top:15px;
  right:15px;
  width:35px;
  height:35px;
  border-radius:50%;
  background:#d63384;
  color:white;
  border:none;
}

#slider{
  margin-top:20px;
  width:100%;
  height:250px;
  overflow:hidden;
  border-radius:10px;
  position: relative;
}
#slider img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
}

.whatsappField{display:flex;}
.whatsappField span{
  background:#eee;
  padding:10px;
}
.whatsappField input{
  flex:1;
}
</style>
</head>

<body>

<div class="container">
  <button id="btnAdmin">⚙</button>

  <h1>💅Agendamentos💅</h1>

  <form id="formAgendamento">
    <input type="text" id="nome" required>
    <div class="whatsappField">
      <span>+55</span>
      <input type="text" id="whatsapp" required>
    </div>
    <input type="date" id="data" required>

    <select id="horario" required>
      <option value="">Selecione horário</option>
    </select>

    <select id="servico" required>
      <option value="">Selecione serviço</option>
      <option>Mão e Pé</option>
      <option>Pedicure</option>
      <option>Manicure</option>
    </select>

    <button type="submit">Agendar</button>
  </form>

  <div id="slider">
    <img id="slideImg">
  </div>
</div>

<!-- LOGIN -->
<div class="container" id="containerLogin" style="display:none">
<h2>Painel Admin</h2>
<form id="formLogin">
<input type="text" id="usuario">
<input type="password" id="senha">
<button type="submit">Login</button>
</form>
</div>

<!-- ADMIN -->
<div class="container" id="painelADM" style="display:none">
<h2>Agendamentos</h2>

<!-- 🔥 BOTÃO RELATÓRIO -->
<button onclick="gerarRelatorio()" style="background:#28a745; margin-bottom:10px;">
📋 Gerar relatório de amanhã
</button>

<p>Total: <span id="totalAgendamentos">0</span></p>

<table>
<thead>
<tr>
<th>Nome</th><th>Data</th><th>Horário</th><th>Serviço</th><th>Ações</th>
</tr>
</thead>
<tbody id="listaAgendamentos"></tbody>
</table>

<h2>Fotos</h2>
<input type="file" id="fotoUpload">
<button id="btnUploadFoto">Enviar Foto</button>
<div id="listaFotos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, orderBy, doc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDr30gr-1zVrkA9Vk3QTOc9-pzbGB0zDpE",
  authDomain: "maosdefada.firebaseapp.com",
  projectId: "maosdefada",
  storageBucket: "maosdefada.firebasestorage.app",
  messagingSenderId: "9299274038",
  appId: "1:9299274038:web:1617789c2ca2a08dfc6b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */
document.getElementById("btnAdmin").onclick = () => {
  document.getElementById("containerLogin").style.display="block";
};

document.getElementById("formLogin").addEventListener("submit", e=>{
  e.preventDefault();
  if(document.getElementById("usuario").value==="Michelly" && document.getElementById("senha").value==="88691553"){
    document.getElementById("painelADM").style.display="block";
    carregarAgendamentos();
  }
});

/* HORÁRIOS */
const horarios = {5:["18:00"],6:["08:00","10:00","14:00","16:00","18:00"]};

document.getElementById("data").addEventListener("change", async ()=>{
  const data = document.getElementById("data").value;
  const select = document.getElementById("horario");
  select.innerHTML='<option>Selecione horário</option>';

  const dia = new Date(data+"T00:00:00").getDay();
  const lista = horarios[dia]||[];

  const snap = await getDocs(query(collection(db,"agendamentos"),where("data","==",data)));
  const ocupados = snap.docs.map(d=>d.data().horario);

  lista.forEach(h=>{
    if(!ocupados.includes(h)){
      const o=document.createElement("option");
      o.value=h;
      o.textContent=h;
      select.appendChild(o);
    }
  });
});

/* AGENDAR */
document.getElementById("formAgendamento").addEventListener("submit", async e=>{
  e.preventDefault();

  const nome = nome.value;
  const whatsapp = whatsapp.value;
  const data = document.getElementById("data").value;
  const horario = document.getElementById("horario").value;
  const servico = document.getElementById("servico").value;

  await addDoc(collection(db,"agendamentos"),{nome, whatsapp, data, horario, servico});

  alert("Agendado!");
});

/* LISTAR */
async function carregarAgendamentos(){
  const snap = await getDocs(query(collection(db,"agendamentos"),orderBy("data")));
  const lista = document.getElementById("listaAgendamentos");
  lista.innerHTML="";
  document.getElementById("totalAgendamentos").innerText = snap.size;

  snap.forEach(docItem=>{
    const a = docItem.data();
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${a.nome}</td><td>${a.data}</td><td>${a.horario}</td><td>${a.servico}</td>
    <td><button onclick="excluir('${docItem.id}')">❌</button></td>`;
    lista.appendChild(tr);
  });
}

window.excluir = async id=>{
  await deleteDoc(doc(db,"agendamentos",id));
  carregarAgendamentos();
};

/* 🔥 RELATÓRIO */
window.gerarRelatorio = async () => {
  try{
    const hoje = new Date();
    const amanha = new Date();
    amanha.setDate(hoje.getDate()+1);

    const data = amanha.toISOString().split("T")[0];

    const snap = await getDocs(query(collection(db,"agendamentos"), where("data","==",data)));

    if(snap.empty){
      alert("Nenhum agendamento amanhã");
      return;
    }

    let msg = "📋 Agendamentos de amanhã:\n\n";

    snap.forEach(d=>{
      const a = d.data();
      msg += `👤 ${a.nome}\n⏰ ${a.horario}\n💅 ${a.servico}\n\n`;
    });

    window.open(`https://wa.me/5511964657571?text=${encodeURIComponent(msg)}`);

  }catch(e){
    alert("Erro no relatório");
    console.error(e);
  }
};
</script>
</body>
  </html>
