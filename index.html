<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michelly Pessoa Agendamentos</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Roboto',Arial,sans-serif;
  background:url("file_00000000497471f5a351a64d074cb17d.png") no-repeat center center fixed;
  background-size:cover;
}
.container{
  background:rgba(255,255,255,0.95);
  max-width:650px;
  margin:40px auto;
  padding:25px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  position:relative;
}
h1,h2{text-align:center;color:#d63384;}
input,select,button{
  width:100%;
  padding:10px;
  margin:8px 0 15px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}
button{
  background:#d63384;
  color:white;
  border:none;
  cursor:pointer;
  transition:0.3s;
}
button:hover{opacity:0.9;}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}
th,td{
  border:1px solid #ccc;
  padding:10px;
  font-size:16px;
}
th{
  background:#d63384;
  color:white;
}
tr:nth-child(even){background:#f9f9f9;}
.today{background:#ffe6f0;}

#btnAdmin {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: #d63384;
  color: white;
  border: none;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
}

#slider{
  margin-top:20px;
  width:100%;
  height:250px;
  overflow:hidden;
  border-radius:10px;
  position: relative;
}
#slider img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition: opacity 0.8s ease-in-out;
  position:absolute;
}

/* WhatsApp */
.whatsappField{display:flex;}
.whatsappField span{background:#eee;padding:10px;}
.whatsappField input{flex:1;}
</style>
</head>

<body>

<div class="container">
  <button id="btnAdmin">⚙</button>

  <h1>💅Agendamentos💅</h1>
  <form id="formAgendamento">
    <input type="text" id="nome" placeholder="Nome e sobrenome" required>
    <div class="whatsappField">
      <span>+55</span>
      <input type="text" id="whatsapp" placeholder="(somente números)" required>
    </div>
    <input type="date" id="data" required>

    <select id="horario" required>
      <option value="">Selecione horário</option>
    </select>

    <select id="servico" required>
      <option value="">Selecione serviço</option>
      <option>Mão e Pé</option>
      <option>Pedicure</option>
      <option>Manicure</option>
    </select>

    <button type="submit">Agendar</button>
  </form>

  <div id="slider">
    <img id="slideImg">
  </div>
</div>

<div class="container" id="containerLogin" style="display:none">
<h2>Painel Admin</h2>
<form id="formLogin">
<input type="text" id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">
<button type="submit">Login</button>
</form>
</div>

<div class="container" id="painelADM" style="display:none">
<h2>Agendamentos</h2>

<button onclick="gerarRelatorio()" style="background:#28a745;margin-bottom:10px;">
📋 Gerar relatório de amanhã
</button>

<p>Total: <span id="totalAgendamentos">0</span></p>

<table>
<thead>
<tr>
<th>Nome</th><th>Data</th><th>Horário</th><th>Serviço</th><th>Ações</th>
</tr>
</thead>
<tbody id="listaAgendamentos"></tbody>
</table>

<h2>Fotos do Slide</h2>
<input type="file" id="fotoUpload">
<button id="btnUploadFoto">Enviar Foto</button>
<div id="listaFotos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, orderBy, doc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDr30gr-1zVrkA9Vk3QTOc9-pzbGB0zDpE",
  authDomain: "maosdefada.firebaseapp.com",
  projectId: "maosdefada",
  storageBucket: "maosdefada.firebasestorage.app",
  messagingSenderId: "9299274038",
  appId: "1:9299274038:web:1617789c2ca2a08dfc6b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ADMIN */
document.getElementById("btnAdmin").onclick = () => {
  document.getElementById("containerLogin").style.display = "block";
};

document.getElementById("formLogin").addEventListener("submit", e=>{
  e.preventDefault();
  if(usuario.value==="Michelly" && senha.value==="88691553"){
    painelADM.style.display="block";
    carregarAgendamentos();
    carregarListaFotos();
  }
});

/* HORÁRIOS */
const horarios = {5:["18:00"],6:["08:00","10:00","14:00","16:00","18:00"]};

data.addEventListener("change", async ()=>{
  horario.innerHTML='<option>Selecione horário</option>';
  const dia = new Date(data.value+"T00:00:00").getDay();
  const lista = horarios[dia]||[];

  const snap = await getDocs(query(collection(db,"agendamentos"),where("data","==",data.value)));
  const ocupados = snap.docs.map(d=>d.data().horario);

  lista.forEach(h=>{
    if(!ocupados.includes(h)){
      const o=document.createElement("option");
      o.value=h;
      o.textContent=h;
      horario.appendChild(o);
    }
  });
});

/* AGENDAMENTO (COM WHATSAPP CORRETO) */
formAgendamento.addEventListener("submit", async e=>{
  e.preventDefault();

  const nomeCliente = nome.value;
  const whatsappCliente = whatsapp.value;
  const dataSel = data.value;
  const horarioSel = horario.value;
  const servicoSel = servico.value;

  await addDoc(collection(db,"agendamentos"),{
    nome:nomeCliente,
    whatsapp:whatsappCliente,
    data:dataSel,
    horario:horarioSel,
    servico:servicoSel
  });

  const msg = `💖 Novo Agendamento 💖

👤 Nome: ${nomeCliente}
📅 Data: ${dataSel}
⏰ Horário: ${horarioSel}
💅 Serviço: ${servicoSel}
📱 WhatsApp: +55${whatsappCliente}`;

  window.location.href=`https://wa.me/5511964657571?text=${encodeURIComponent(msg)}`;
});

/* LISTAR */
async function carregarAgendamentos(){
  const snap = await getDocs(query(collection(db,"agendamentos"),orderBy("data")));
  listaAgendamentos.innerHTML="";
  totalAgendamentos.innerText = snap.size;

  snap.forEach(docItem=>{
    const a = docItem.data();
    listaAgendamentos.innerHTML+=`
    <tr>
    <td>${a.nome}</td>
    <td>${a.data}</td>
    <td>${a.horario}</td>
    <td>${a.servico}</td>
    <td>
      <button onclick="excluir('${docItem.id}')">❌</button>
      <button onclick="enviarConfirmacao('${a.nome}','${a.whatsapp}','${a.data}','${a.horario}')">💌 Confirmar</button>
    </td>
    </tr>`;
  });
}

window.excluir = async id=>{
  await deleteDoc(doc(db,"agendamentos",id));
  carregarAgendamentos();
};

/* CONFIRMAÇÃO ORIGINAL */
window.enviarConfirmacao = (nome, whatsapp, data, horario) => {
  const msg = `Olá, ${nome}! 💖

Estou passando para confirmar seu horário:
📅 Data: ${data}
⏰ Horário: ${horario}

Te espero! ✨💕

Michelly 💅`;

  window.open(`https://wa.me/55${whatsapp}?text=${encodeURIComponent(msg)}`);
};

/* RELATÓRIO CORRIGIDO */
window.gerarRelatorio = async () => {

  const hoje = new Date();
  const amanha = new Date();
  amanha.setDate(hoje.getDate()+1);

  const ano = amanha.getFullYear();
  const mes = String(amanha.getMonth()+1).padStart(2,'0');
  const dia = String(amanha.getDate()).padStart(2,'0');
  const dataFormatada = `${ano}-${mes}-${dia}`;

  const snap = await getDocs(query(collection(db,"agendamentos"), where("data","==",dataFormatada)));

  if(snap.empty){
    alert("Nenhum agendamento amanhã");
    return;
  }

  let msg = `📋 Agenda de amanhã 💅\n\n`;

  snap.forEach(d=>{
    const a = d.data();
    msg += `👤 ${a.nome}\n⏰ ${a.horario}\n💅 ${a.servico}\n\n`;
  });

  window.open(`https://wa.me/5511964657571?text=${encodeURIComponent(msg)}`);
};

/* SLIDER */
let fotos = [];
let index = 0;
const slideImg = document.getElementById("slideImg");

async function carregarFotos(){
  fotos = [];
  const snap = await getDocs(collection(db,"fotos"));
  snap.forEach(d => fotos.push(d.data().url));
  if(fotos.length>0) slideImg.src = fotos[0];

  setInterval(() => {
    if(fotos.length === 0) return;
    slideImg.style.opacity = 0;
    setTimeout(() => {
      index++;
      if(index >= fotos.length) index = 0;
      slideImg.src = fotos[index];
      slideImg.style.opacity = 1;
    }, 500);
  }, 3000);
}
carregarFotos();
</script>

</body>
  </html>
